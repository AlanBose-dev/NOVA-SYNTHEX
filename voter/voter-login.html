<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Login | NOVA-SYNTHEX</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.292.0/dist/umd/lucide.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        nova: {
                            bg: '#050505',
                            surface: '#0F0F12',
                            border: '#1F1F26',
                            accent: '#10b981', // Emerald for Voters
                            text: '#E2E2E5',
                            muted: '#A1A1AA',
                            error: '#ef4444'
                        }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #E2E2E5; }
        
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        input {
            background-color: #0F0F12;
            border: 1px solid #1F1F26;
            color: #E2E2E5;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #10b981; 
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-6">

    <!-- Background -->
    <div class="fixed inset-0 bg-grid z-0 pointer-events-none"></div>
    <!-- Ambient Glow -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-emerald-900/10 rounded-full blur-[100px] -z-10"></div>

    <main class="w-full max-w-md relative z-10">
        
        <!-- Section A: Context Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <i data-lucide="vote" class="text-nova-accent h-8 w-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">Voter Login</h1>
            <p class="text-sm text-nova-muted">
                Enter your credentials to participate in the election.
            </p>
        </div>

        <!-- Section B: Login Form -->
        <div class="bg-nova-surface border border-nova-border rounded-lg p-8 shadow-2xl relative overflow-hidden">
            
            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-20 hidden flex-col items-center justify-center text-center p-6">
                <div class="w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-sm font-mono text-emerald-400 animate-pulse">VERIFYING CREDENTIALS...</p>
            </div>

            <form id="loginForm" class="space-y-5">
                
                <!-- Feedback Area -->
                <div id="errorFeedback" class="hidden p-3 bg-red-900/20 border border-red-500/30 rounded flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0"></i>
                    <p id="errorText" class="text-xs text-red-400">Invalid credentials.</p>
                </div>

                <div>
                    <label class="block text-xs font-mono text-nova-muted mb-2 uppercase tracking-wider">Election ID</label>
                    <div class="relative">
                        <i data-lucide="hash" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                        <input type="text" id="electionId" required 
                            class="w-full pl-10 pr-4 py-2.5 rounded text-sm placeholder-gray-700 font-mono uppercase" 
                            placeholder="ELEC-XXXX-XXXX">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-mono text-nova-muted mb-2 uppercase tracking-wider">Voter Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                        <input type="text" id="username" required 
                            class="w-full pl-10 pr-4 py-2.5 rounded text-sm placeholder-gray-700" 
                            placeholder="Enter username">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-mono text-nova-muted mb-2 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                        <input type="password" id="password" required 
                            class="w-full pl-10 pr-4 py-2.5 rounded text-sm placeholder-gray-700" 
                            placeholder="••••••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" id="loginBtn" class="w-full bg-white text-black font-bold py-3 rounded hover:bg-emerald-50 transition-all shadow-lg shadow-emerald-500/10 flex items-center justify-center gap-2">
                        <span>Access Dashboard</span>
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>

            </form>
        </div>

        <!-- Section D: Navigation -->
        <div class="text-center mt-8">
            <a href="../portal-select.html" class="inline-flex items-center gap-2 text-xs font-mono text-nova-muted hover:text-white transition-colors">
                <i data-lucide="arrow-left" class="w-3 h-3"></i>
                RETURN TO PORTAL SELECTION
            </a>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBhPMM3vSUiCdJISSiWkQkmJVHcUi86HA0",
            authDomain: "nova-synthex.firebaseapp.com",
            projectId: "nova-synthex",
            storageBucket: "nova-synthex.firebasestorage.app",
            messagingSenderId: "244535502788",
            appId: "1:244535502788:web:5b186fff5b79f369b6e691"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Pathing for Preview
        const isPreviewEnv = typeof __app_id !== 'undefined';
        const appId = isPreviewEnv ? __app_id : 'default-app-id';
        const ELECTIONS_PATH = isPreviewEnv ? `artifacts/${appId}/public/data/elections` : "elections";

        if (typeof lucide !== 'undefined') lucide.createIcons();

        window.handleLogin = async function(e) {
            e.preventDefault();
            
            const electionId = document.getElementById('electionId').value.trim().toUpperCase();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            const errorFeedback = document.getElementById('errorFeedback');
            const errorText = document.getElementById('errorText');
            
            // 1. UI: Loading State
            loadingOverlay.classList.remove('hidden');
            loadingOverlay.style.display = 'flex';
            errorFeedback.classList.add('hidden');

            try {
                // 2. Authenticate to satisfy Security Rules before querying
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 3. Logic: Check Election Existence
                const electionRef = doc(db, `${ELECTIONS_PATH}/${electionId}`);
                const electionSnap = await getDoc(electionRef);

                if (!electionSnap.exists()) {
                    throw new Error("Election ID not found or invalid.");
                }

                const electionData = electionSnap.data();

                // Check if election is permanently closed
                if (electionData.status === 'CLOSED') {
                    throw new Error("This election has closed.");
                }
                // We no longer block if status is DRAFT or PAUSED, so voters can wait in the dashboard

                // 4. Logic: Check Voter Credentials
                const votersRef = collection(db, `${ELECTIONS_PATH}/${electionId}/voters`);
                const q = query(votersRef, where("username", "==", username));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    throw new Error("Invalid username or password.");
                }

                const voterDoc = querySnapshot.docs[0];
                const voterData = voterDoc.data();

                if (voterData.password !== password) {
                    throw new Error("Invalid username or password.");
                }

                // Check Duplicate Voting
                if (voterData.hasVoted) {
                    throw new Error("You have already participated in this election.");
                }

                // 5. Success - Set Session
                sessionStorage.setItem('nova_voter_session', JSON.stringify({
                    electionId: electionId,
                    voterId: voterDoc.id,
                    username: username,
                    org: electionData.org,
                    title: electionData.title,
                    timestamp: new Date().toISOString()
                }));

                // Redirect to Dashboard
                window.location.href = 'voter-dashboard.html';

            } catch (err) {
                loadingOverlay.classList.add('hidden');
                loadingOverlay.style.display = 'none';
                
                errorFeedback.classList.remove('hidden');
                
                if (err.message.includes("closed") || err.message.includes("Election") || err.message.includes("participated")) {
                    errorText.innerText = err.message;
                } else if (err.code === 'permission-denied') {
                    errorText.innerText = "Database connection blocked. Please disable Ad-Blockers/Tracking Prevention.";
                } else {
                    errorText.innerText = "Authentication failed. Please check your credentials.";
                }
                
                const form = document.getElementById('loginForm');
                form.classList.add('animate-pulse');
                setTimeout(() => form.classList.remove('animate-pulse'), 200);
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', window.handleLogin);

    </script>
</body>
</html>
