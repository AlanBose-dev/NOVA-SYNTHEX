<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Login | NOVA-SYNTHEX</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.292.0/dist/umd/lucide.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        nova: {
                            bg: '#050505',
                            surface: '#0F0F12',
                            border: '#1F1F26',
                            accent: '#6366f1',
                            text: '#E2E2E5',
                            muted: '#A1A1AA',
                            error: '#ef4444'
                        }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #E2E2E5; }
        
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        input {
            background-color: #0F0F12;
            border: 1px solid #1F1F26;
            color: #E2E2E5;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-6">

    <!-- Background -->
    <div class="fixed inset-0 bg-grid z-0 pointer-events-none"></div>
    <!-- Ambient Glow -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-900/10 rounded-full blur-[100px] -z-10"></div>

    <main class="w-full max-w-md relative z-10">
        
        <!-- Section A: Context Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <i data-lucide="hexagon" class="text-nova-accent h-8 w-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">Election Admin Login</h1>
            <p class="text-sm text-nova-muted">
                Access control is restricted to authorized administrators of a specific election.
            </p>
        </div>

        <!-- Section B: Login Form -->
        <div class="bg-nova-surface border border-nova-border rounded-lg p-8 shadow-2xl relative overflow-hidden">
            
            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-20 hidden flex-col items-center justify-center text-center p-6">
                <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-sm font-mono text-indigo-400 animate-pulse">AUTHENTICATING... PLEASE WAIT</p>
            </div>

            <form id="loginForm" class="space-y-5">
                
                <!-- Feedback Area -->
                <div id="errorFeedback" class="hidden p-3 bg-red-900/20 border border-red-500/30 rounded flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0"></i>
                    <p id="errorText" class="text-xs text-red-400">Invalid credentials.</p>
                </div>

                <div>
                    <label class="block text-xs font-mono text-nova-muted mb-2 uppercase tracking-wider">Election ID</label>
                    <div class="relative">
                        <i data-lucide="hash" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                        <input type="text" id="electionId" required 
                            class="w-full pl-10 pr-4 py-2.5 rounded text-sm placeholder-gray-700 font-mono uppercase" 
                            placeholder="ELEC-XXXX-XXXX">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-mono text-nova-muted mb-2 uppercase tracking-wider">Admin Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                        <input type="text" id="username" required 
                            class="w-full pl-10 pr-4 py-2.5 rounded text-sm placeholder-gray-700" 
                            placeholder="Enter username">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-mono text-nova-muted mb-2 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                        <input type="password" id="password" required 
                            class="w-full pl-10 pr-4 py-2.5 rounded text-sm placeholder-gray-700" 
                            placeholder="••••••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" id="loginBtn" class="w-full bg-white text-black font-bold py-3 rounded hover:bg-indigo-50 transition-all shadow-lg shadow-indigo-500/10 flex items-center justify-center gap-2">
                        <span>Authenticate</span>
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>

            </form>
        </div>

        <!-- Section D: Navigation -->
        <div class="text-center mt-8">
            <a href="../initialize.html" class="inline-flex items-center gap-2 text-xs font-mono text-nova-muted hover:text-white transition-colors">
                <i data-lucide="arrow-left" class="w-3 h-3"></i>
                RETURN TO SYSTEM INITIALIZATION
            </a>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Secure Configuration Handling
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBhPMM3vSUiCdJISSiWkQkmJVHcUi86HA0",
            authDomain: "nova-synthex.firebaseapp.com",
            projectId: "nova-synthex",
            storageBucket: "nova-synthex.firebasestorage.app",
            messagingSenderId: "244535502788",
            appId: "1:244535502788:web:5b186fff5b79f369b6e691"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Init Icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        } else {
            window.onload = () => lucide.createIcons();
        }

        window.handleLogin = async function(e) {
            e.preventDefault();
            
            const electionId = document.getElementById('electionId').value.trim().toUpperCase();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            const errorFeedback = document.getElementById('errorFeedback');
            const errorText = document.getElementById('errorText');
            
            // 1. UI: Loading State
            loadingOverlay.classList.remove('hidden');
            loadingOverlay.style.display = 'flex'; // Ensure flex layout
            errorFeedback.classList.add('hidden');

            try {
                // Ensure authentication is completed BEFORE attempting to read the database
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // Reference the specific election document
                const docRef = doc(db, "elections", electionId);
                const docSnap = await getDoc(docRef);

                // Validation 1: Check if Election Exists
                if (!docSnap.exists()) {
                    throw new Error("Election ID not found or invalid.");
                }

                const electionData = docSnap.data();

                // Validation 2: Check Credentials
                if (electionData.admin.username !== username || electionData.admin.password !== password) {
                    throw new Error("Invalid username or password.");
                }

                // Validation 3: Check Verification Status
                if (electionData.admin.verified !== true) {
                    throw new Error("Admin identity verification is incomplete.");
                }

                // 3. Success - Set Session Storage for Dashboard context
                sessionStorage.setItem('nova_admin_session', JSON.stringify({
                    electionId: electionId,
                    username: username,
                    timestamp: new Date().toISOString()
                }));

                // Redirect to Admin Dashboard
                window.location.href = 'admin-dashboard.html';

            } catch (err) {
                console.error(err);
                // 4. Failure
                loadingOverlay.classList.add('hidden');
                loadingOverlay.style.display = 'none';
                
                errorFeedback.classList.remove('hidden');
                
                // Show better error messages for debugging permissions
                if (err.message.includes("Election ID")) {
                     errorText.innerText = err.message;
                } else if (err.code === 'permission-denied') {
                     errorText.innerText = "Database security blocked the request. Please ensure you are authenticated.";
                } else {
                     errorText.innerText = "Authentication failed. Please check your credentials.";
                }
                
                // Shake animation effect
                const form = document.getElementById('loginForm');
                form.classList.add('animate-pulse');
                setTimeout(() => form.classList.remove('animate-pulse'), 200);
            }
        }
        
        // Attach listener explicitly
        document.getElementById('loginForm').addEventListener('submit', window.handleLogin);

    </script>
</body>
</html>
